<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cartera - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        .header-distrileco { background: linear-gradient(135deg, #0f172a 0%, #334155 100%); }
        .card-total { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .btn-wa { background-color: #25D366; color: white; transition: 0.2s; font-weight: 900; }
        .btn-reporte { position: fixed; bottom: 25px; right: 25px; z-index: 50; background-color: #059669; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 2px solid white; }
    </style>
</head>
<body class="p-2 md:p-6">

    <button onclick="enviarReporteAlVendedorActivo()" id="btnReporte" style="display:none;" class="btn-reporte text-white p-4 rounded-full flex items-center gap-2 font-black text-xs uppercase shadow-2xl">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        Enviar Informe
    </button>

    <header class="header-distrileco text-white p-8 rounded-[2.5rem] shadow-2xl mb-6 text-center border-b-4 border-emerald-500">
        <h1 class="text-2xl md:text-3xl font-black uppercase tracking-tighter text-emerald-400">GESTIÓN DE CARTERA</h1>
        <h2 class="text-xl md:text-2xl font-bold uppercase opacity-90 mt-1">DISTRILECO CAUCASIA SAS</h2>
        
        <div id="displayAsesor" class="mt-4 bg-white/10 inline-block px-8 py-3 rounded-full border border-white/20">
            <p class="text-[10px] uppercase font-black tracking-widest text-emerald-300">Asesor de Zona:</p>
            <p id="nombreAsesorActual" class="text-lg font-bold italic">No identificado</p>
            <button onclick="mostrarSelector()" id="btnCambiar" class="text-[9px] underline text-emerald-200 block mx-auto mt-1 uppercase font-bold hidden">Cambiar Asesor</button>
        </div>

        <div id="contenedorSelector" class="mt-6 flex flex-col items-center gap-2">
            <select id="selectVendedor" class="w-full max-w-xs bg-white text-slate-900 rounded-xl px-4 py-2 font-bold shadow-lg outline-none border-2 border-emerald-500">
                <option value="">-- ELIJA SU NOMBRE --</option>
                <option value="ALL">TODA LA CARTERA</option>
                <option value="01">01 - HAROLD MARIN</option>
                <option value="02">02 - DANNY TRONCOSO</option>
                <option value="03">03 - ALEXANDER SANCHEZ</option>
                <option value="04">04 - JUAN CARLOS QUINTANA</option>
                <option value="06">06 - LORENZO CASTELLAR</option>
                <option value="07">07 - ARGENIS MEZA</option>
                <option value="10">10 - GELYDIS ENAMORADO</option>
                <option value="17">17 - ROBERT ATENCIA</option>
                <option value="22">22 - JUAN CARLOS ZABALA</option>
                <option value="26">26 - ROY REYES</option>
                <option value="28">28 - RUBEN ABENDAÑO</option>
                <option value="32">32 - JULIET RODRIGUEZ</option>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mb-24">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-2 border-dashed border-slate-200">
                <input type="file" id="uploadExcel" accept=".xlsx, .xls" class="text-[10px] file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-emerald-50 file:text-emerald-700 font-bold">
            </div>
            <div class="md:col-span-3 card-total p-6 rounded-3xl shadow-xl text-white border-r-8 border-emerald-500">
                <p class="text-emerald-400 text-[10px] font-black uppercase italic tracking-widest leading-none mb-2">Cartera en Gestión</p>
                <h2 id="total-general-monto" class="text-4xl md:text-5xl font-black italic">$0</h2>
                <span id="total-general-count" class="text-emerald-100 text-xs font-bold">0 Fac.</span>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8 text-center uppercase">
            <div class="bg-white p-4 rounded-2xl border-b-8 border-slate-300 shadow-sm">
                <p class="text-slate-400 text-[9px] font-black">Corriente</p>
                <h3 id="res-bajo-count" class="text-lg font-black text-slate-700 leading-none">0 Fac.</h3>
                <p id="res-bajo-monto" class="text-sm font-bold text-slate-500">$0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border-b-8 border-amber-400 shadow-sm">
                <p class="text-amber-500 text-[9px] font-black">Preventivo</p>
                <h3 id="res-medio-count" class="text-lg font-black text-amber-600 leading-none">0 Fac.</h3>
                <p id="res-medio-monto" class="text-sm font-bold text-slate-500">$0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border-b-8 border-rose-600 shadow-sm">
                <p class="text-rose-600 text-[9px] font-black">Crítico</p>
                <h3 id="res-alto-count" class="text-lg font-black text-rose-700 leading-none">0 Fac.</h3>
                <p id="res-alto-monto" class="text-sm font-black text-rose-700 font-bold">$0</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
            <div class="bg-slate-900 p-4 text-white text-center font-black text-[10px] uppercase">Facturas +37 Días</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 text-slate-400 font-black uppercase">
                        <tr>
                            <th class="p-4">Cliente</th>
                            <th class="p-4">Factura</th>
                            <th class="p-4">Vence</th>
                            <th class="p-4">Monto</th>
                            <th class="p-4 text-center">Días</th>
                            <th class="p-4 text-center">WA</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 italic text-slate-400 text-[10px]">
                        <tr><td colspan="6" class="p-16 text-center">Suba el archivo cartera2.xlsx para ver los datos</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const agendaVendedores = {
            "01": { nombre: "HAROLD MARIN", cel: "573117700431" },
            "02": { nombre: "DANNY TRONCOSO", cel: "573137671011" },
            "03": { nombre: "ALEXANDER SANCHEZ", cel: "573218037260" },
            "04": { nombre: "JUAN CARLOS QUINTANA", cel: "573204077185" },
            "06": { nombre: "LORENZO CASTELLAR", cel: "573113896092" },
            "07": { nombre: "ARGENIS MEZA", cel: "573122960169" },
            "10": { nombre: "GELYDIS ENAMORADO", cel: "573135031118" },
            "17": { nombre: "ROBERT ATENCIA", cel: "573022107387" },
            "22": { nombre: "JUAN CARLOS ZABALA", cel: "573232911903" },
            "26": { nombre: "ROY REYES", cel: "573108480777" },
            "28": { nombre: "RUBEN ABENDAÑO", cel: "573148010448" },
            "32": { nombre: "JULIET RODRIGUEZ", cel: "573135780204" }
        };

        let rawData = [];
        let criticosFiltrados = [];

        window.onload = function() {
            const saved = localStorage.getItem('vendedorDistrileco');
            if (saved) {
                document.getElementById('selectVendedor').value = saved;
                ocultarSelector();
            }
            actualizarNombreCabecera();
            cargarExcelAutomatico();
        };

        function cargarExcelAutomatico() {
            fetch("cartera2.xlsx")
                .then(res => { if(!res.ok) throw new Error(); return res.arrayBuffer(); })
                .then(ab => { procesarExcelData(ab); })
                .catch(() => console.log("Esperando carga manual"));
        }

        document.getElementById('uploadExcel').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => procesarExcelData(event.target.result);
            reader.readAsArrayBuffer(file);
        });

        function procesarExcelData(buffer) {
            try {
                const data = new Uint8Array(buffer);
                // cellDates: true es clave para leer fechas correctamente
                const wb = XLSX.read(data, { type: 'array', cellDates: true });
                const hoja = wb.Sheets[wb.SheetNames[0]];
                rawData = XLSX.utils.sheet_to_json(hoja, { defval: "" });
                renderApp();
            } catch (e) {
                alert("Error leyendo el Excel.");
            }
        }

        document.getElementById('selectVendedor').addEventListener('change', function() {
            if (this.value !== "") {
                localStorage.setItem('vendedorDistrileco', this.value);
                ocultarSelector();
                actualizarNombreCabecera();
                renderApp();
            }
        });

        function mostrarSelector() {
            document.getElementById('contenedorSelector').style.display = 'flex';
            document.getElementById('btnCambiar').classList.add('hidden');
        }

        function ocultarSelector() {
            document.getElementById('contenedorSelector').style.display = 'none';
            document.getElementById('btnCambiar').classList.remove('hidden');
        }

        function actualizarNombreCabecera() {
            const sel = document.getElementById('selectVendedor');
            const nombre = sel.options[sel.selectedIndex].text;
            document.getElementById('nombreAsesorActual').innerText = (nombre.includes("--")) ? "No identificado" : nombre;
        }

        function renderApp() {
            if (rawData.length === 0) return;
            const vSel = document.getElementById('selectVendedor').value;
            const tbody = document.getElementById('tableBody');
            const hoy = new Date();
            hoy.setHours(0,0,0,0); // Normalizar hoy
            
            tbody.innerHTML = '';
            criticosFiltrados = [];

            let t = { gC:0, gT:0, bC:0, bT:0, mC:0, mT:0, aC:0, aT:0 };

            rawData.forEach((row) => {
                const codV = (row.vended || row.vendedor || "").toString().padStart(2, '0');
                if (vSel !== "ALL" && parseInt(codV) !== parseInt(vSel)) return;

                const val = parseFloat(row.ttotal || row.valor || 0);
                const fechaRaw = row.fecha || row.FECHA;
                let fFact = new Date(fechaRaw);
                
                // Limpieza de fechas inválidas o muy antiguas
                if (isNaN(fFact.getTime()) || fFact.getFullYear() < 2010) return;
                fFact.setHours(0,0,0,0);
                
                const d = Math.floor((hoy - fFact) / (1000 * 60 * 60 * 24));
                const fVencRaw = row.vencimiento || row.VENCIMIENTO;
                const fVenc = (fVencRaw instanceof Date) ? fVencRaw.toLocaleDateString() : String(fVencRaw);

                t.gC++; t.gT += val;
                if (d <= 30) { t.bC++; t.bT += val; }
                else if (d <= 37) { t.mC++; t.mT += val; }
                else {
                    t.aC++; t.aT += val;
                    criticosFiltrados.push({ cli: row.razon_social, val: val, d: d, fac: row.numero, tel: row.telefonos, venc: fVenc });
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 border-l-4 border-rose-600">
                            <td class="p-4 font-bold text-slate-800 uppercase leading-tight">${row.razon_social}</td>
                            <td class="p-4 font-mono text-slate-500">#${row.numero}</td>
                            <td class="p-4 text-slate-400">${fVenc}</td>
                            <td class="p-4 font-black text-emerald-800">$${val.toLocaleString()}</td>
                            <td class="p-4 text-center"><span class="bg-rose-600 text-white px-2 py-0.5 rounded-full font-black italic underline">${d}d</span></td>
                            <td class="p-4 text-center"><button onclick="enviarWA('${row.telefonos}', '${row.razon_social}', '${row.numero}', '${val}', '${fVenc}')" class="btn-wa p-2 rounded-xl text-lg shadow-sm">📱</button></td>
                        </tr>`;
                }
            });

            document.getElementById('total-general-monto').innerText = `$${t.gT.toLocaleString()}`;
            document.getElementById('total-general-count').innerText = `${t.gC} Fac.`;
            document.getElementById('res-bajo-count').innerText = `${t.bC} Fac.`;
            document.getElementById('res-bajo-monto').innerText = `$${t.bT.toLocaleString()}`;
            document.getElementById('res-medio-count').innerText = `${t.mC} Fac.`;
            document.getElementById('res-medio-monto').innerText = `$${t.mT.toLocaleString()}`;
            document.getElementById('res-alto-count').innerText = `${t.aC} Fac.`;
            document.getElementById('res-alto-monto').innerText = `$${t.aT.toLocaleString()}`;
            
            document.getElementById('btnReporte').style.display = (t.aC > 0 && vSel !== "ALL") ? 'flex' : 'none';
        }

        function enviarWA(tel, cli, fac, val, venc) {
            // Lógica para manejar teléfonos múltiples separados por guion o coma
            let primerTel = tel.toString().split('-')[0].split(',')[0].split(' ')[0];
            let t = primerTel.replace(/\D/g, '');
            
            if (t.length < 10) {
                alert("Número de teléfono no válido: " + primerTel);
                return;
            }
            if (t.length === 10) t = '57' + t;
            
            const m = `Hola *${cli}*, de *DISTRILECO*. Te recordamos el pago de la Factura *#${fac}* por *$${Number(val).toLocaleString()}* que venció el *${venc}*. Agradecemos tu gestión inmediata.`;
            window.open(`https://wa.me/${t}?text=${encodeURIComponent(m)}`, '_blank');
        }

        function enviarReporteAlVendedorActivo() {
            const vSel = document.getElementById('selectVendedor').value;
            const asesor = agendaVendedores[vSel];
            if (!asesor) return;
            
            let m = `⚠️ *INFORME CARTERA CRÍTICA*\n🤝 *Asesor:* ${asesor.nombre}\n--------------------------------\n`;
            criticosFiltrados.forEach((f, i) => { 
                m += `${i+1}. *${f.cli}*\n📄 Fact: *#${f.fac}* | 📅 Vence: *${f.venc}*\n💰 *$${f.val.toLocaleString()}* | 🔥 *${f.d} días*\n\n`; 
            });
            m += `_Distrileco Caucasia SAS_`;
            window.open(`https://wa.me/${asesor.cel}?text=${encodeURIComponent(m)}`, '_blank');
        }
    </script>
</body>
</html>
